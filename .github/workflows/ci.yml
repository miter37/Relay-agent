name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# A newer push to the same branch cancels the previous run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Check formatting
        run: ruff format --check .
      - name: Lint
        run: ruff check .

  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show environment
        run: |
          python --version
          python -c "import sys, platform; print(platform.platform())"

      - name: Make mock CLIs executable
        if: runner.os != 'Windows'
        run: chmod +x mocks/claude mocks/codex mocks/agy

      - name: Run test suite
        run: python -m unittest discover -s tests -v

      - name: Build release artifact
        run: python build_release.py

      - name: Verify the built artifact runs
        run: python relay.pyz version

  gui-smoke:
    name: GUI smoke / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install GUI extra
        run: python -m pip install ".[gui]"
      - name: Run GUI smoke tests
        run: python -m unittest tests.test_g1_gui -v
